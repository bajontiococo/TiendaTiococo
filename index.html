<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="icon" type="image/webp" href="imagenes/logo.webp">
    <title>Tiococo | Comida Rápida</title>
    <meta name="description" content="Tu comida rápida favorita directo a tu casa.">
    
    <meta property="og:title" content="Tiococo | Menú Online">
    <meta property="og:description" content="Pide rápido, come delicioso.">
    <meta property="og:image" content="imagenes/logo.webp"> 
    <meta property="og:type" content="website">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="styles.css">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    //aqui debe ir al css

</head>
<body class="font-sans antialiased overflow-x-hidden">

    <main id="main-content" class="pt-28 px-4 md:px-12 layout-desktop min-h-screen">
        </main>

    <aside id="cart-sidebar" class="fixed inset-y-0 right-0 w-full md:w-[420px] bg-white z-[160] shadow-2xl transform translate-x-full flex flex-col h-full">
        <div class="p-6 border-b border-gray-50 flex justify-between items-center bg-gray-50/50 flex-shrink-0">
            <h2 class="text-xl font-black uppercase text-gray-800">Tu Pedido</h2>
            <button onclick="forceCloseCart()" class="text-gray-400 hover:text-black transition text-xl w-10 h-10 rounded-full hover:bg-white flex items-center justify-center">✕</button>
        </div>
        
        <div id="cart-items" class="flex-1 overflow-y-auto p-6 space-y-6"></div>
        
        <div class="p-5 bg-white border-t border-gray-50 shadow-[0_-5px_20px_rgba(0,0,0,0.05)] flex-shrink-0">
            <div class="bg-gray-50 p-3 rounded-lg border border-gray-100 mb-4">
                <div class="flex justify-between text-xs text-gray-600 mb-1">
                    <span>Subtotal:</span>
                    <span id="cart-subtotal" class="font-medium">$0</span>
                </div>
                <div class="flex justify-between text-xs text-gray-600">
                    <span id="cart-envio-label">Costo de envío:</span>
                    <span id="cart-envio-monto" class="font-medium text-beige">Calculando...</span>
                </div>
            </div>
            
            <div class="flex justify-between items-end mb-4">
                <span class="text-sm font-bold text-gray-500 uppercase">Total Final</span> 
                <span id="cart-total" class="text-2xl font-black text-gray-900">$0</span>
            </div>

            <button id="btn-checkout" onclick="procesarCheckout()" class="w-full bg-[#25D366] text-white py-4 rounded-xl font-bold uppercase tracking-widest hover:bg-[#1DA851] transition-all shadow-lg flex items-center justify-center gap-3 text-sm">
                Pedir por WhatsApp <i class="fab fa-whatsapp text-xl"></i>
            </button>
        </div>
    </aside>

    <script src="app.js"></script>
</body>
</html>
